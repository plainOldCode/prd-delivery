# docker-compose.yml — MariaDB service for local dev & testing
# Usage:
#   docker compose up -d          # start database
#   docker compose down           # stop and remove
version: "3.8"

services:
  mysql:
    image: mariadb:11.4
    container_name: prd-backend-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: example_app
      MYSQL_USER: example
      MYSQL_PASSWORD: example
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mariadb-data:
    driver: local
