name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Backend install + test
        run: |
          cd backend
          bun install
          bun run build
          export DATABASE_URL="file::memory:"
          bun run test

      - name: Frontend install + build
        run: |
          cd frontend
          bun install
          bun run build

      - name: Install Playwright browsers
        run: |
          cd frontend
          bunx playwright install --with-deps chromium

      - name: E2E tests
        run: |
          cd backend
          DATABASE_URL="file::memory:" bun run dev &
          sleep 2
          cd ../frontend
          bun run dev &
          sleep 3
          bun run e2e
