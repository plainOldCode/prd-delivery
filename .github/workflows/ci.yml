name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Backend install + test
        run: |
          cd backend
          bun install
          bun run build
          export DATABASE_URL="file::memory:"
          bun run test

      - name: Frontend install + build
        run: |
          cd frontend
          bun install
          bun run build

      - name: Install Playwright browsers
        run: |
          cd frontend
          bunx playwright install --with-deps chromium

      - name: E2E tests
        env:
          DATABASE_URL: "file::memory:"
        run: |
          cd frontend
          bun run e2e
